<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>筋トレタイマー</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#0f0f0f">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f0f0f; color: #fff;
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
    }
    .wrap {
      display: flex; flex-direction: column; align-items: center;
      padding: 2.5rem 1rem 2rem; gap: 2rem; width: 100%; max-width: 380px;
    }
    .label-top { font-size: 11px; letter-spacing: 4px; text-transform: uppercase; color: #666; font-weight: 500; }
    .clock-ring { position: relative; width: 240px; height: 240px; }
    .clock-ring svg { position: absolute; top: 0; left: 0; transform: rotate(-90deg); }
    .clock-inner {
      position: absolute; inset: 0; display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 4px;
    }
    .clock {
      font-family: 'Courier New', monospace; font-size: 56px; font-weight: 600;
      color: #fff; letter-spacing: 2px; line-height: 1; transition: color 0.3s;
    }
    .clock.running { color: #4da6ff; }
    .clock.finished { color: #ff5c5c; }
    .clock-sub { font-size: 11px; letter-spacing: 2px; color: #555; }
    .sec-btns { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; }
    .sec-btn {
      position: relative; padding: 13px 0; font-size: 14px; font-weight: 600;
      border: 1.5px solid #333; border-radius: 10px;
      background: #1a1a1a; color: #aaa; cursor: pointer;
      transition: all 0.15s; width: 76px; text-align: center; overflow: hidden;
      -webkit-tap-highlight-color: transparent;
    }
    .sec-btn::after {
      content: ''; position: absolute; bottom: 0; left: 0; right: 0;
      height: 2px; background: #4da6ff; transform: scaleX(0); transition: transform 0.2s;
    }
    .sec-btn:active { transform: scale(0.95); background: #222; }
    .sec-btn.active { background: #4da6ff22; color: #4da6ff; border-color: #4da6ff; }
    .sec-btn.active::after { transform: scaleX(1); }
    .sec-label { font-size: 10px; display: block; letter-spacing: 1px; opacity: 0.6; margin-top: 2px; font-weight: 400; }
    .divider { width: 100%; max-width: 320px; border: none; border-top: 1px solid #222; }
    .ctrl-btns { display: flex; gap: 12px; }
    .ctrl-btn {
      padding: 13px 36px; font-size: 14px; font-weight: 600; letter-spacing: 1.5px;
      border-radius: 10px; cursor: pointer; transition: all 0.15s; text-transform: uppercase;
      -webkit-tap-highlight-color: transparent;
    }
    .ctrl-btn:active { transform: scale(0.96); }
    .ctrl-btn.stop { border: 1.5px solid #ff5c5c; color: #ff5c5c; background: transparent; }
    .ctrl-btn.stop:active { background: #ff5c5c22; }
    .ctrl-btn.reset { border: 1.5px solid #333; color: #666; background: #1a1a1a; }
    .ctrl-btn.reset:active { background: #222; color: #aaa; }
    .status-msg { font-size: 12px; letter-spacing: 2px; color: #ff5c5c; height: 16px; text-transform: uppercase; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="label-top">Rest Timer</div>
    <div class="clock-ring">
      <svg width="240" height="240" viewBox="0 0 240 240">
        <circle cx="120" cy="120" r="108" fill="none" stroke="#222" stroke-width="6"/>
        <circle id="ring" cx="120" cy="120" r="108" fill="none" stroke="#4da6ff"
          stroke-width="6" stroke-linecap="round"
          stroke-dasharray="678.58" stroke-dashoffset="678.58"
          style="transition: stroke-dashoffset 0.6s linear, stroke 0.3s;"/>
      </svg>
      <div class="clock-inner">
        <div class="clock" id="clock">00:00</div>
        <div class="clock-sub" id="clock-sub">— sec</div>
      </div>
    </div>
    <div class="sec-btns">
      <button class="sec-btn" onclick="startTimer(90)">90<span class="sec-label">sec</span></button>
      <button class="sec-btn" onclick="startTimer(120)">120<span class="sec-label">sec</span></button>
      <button class="sec-btn" onclick="startTimer(150)">150<span class="sec-label">sec</span></button>
      <button class="sec-btn" onclick="startTimer(180)">180<span class="sec-label">sec</span></button>
    </div>
    <hr class="divider">
    <div class="ctrl-btns">
      <button class="ctrl-btn stop" onclick="stopTimer()">Stop</button>
      <button class="ctrl-btn reset" onclick="resetTimer()">Reset</button>
    </div>
    <div class="status-msg" id="status"></div>
  </div>
  <script>
    // PWA Service Worker登録
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js');
    }

    const CIRC = 2 * Math.PI * 108;
    let total = 0, remaining = 0, interval = null;
    let startTime = null, pausedRemaining = null, worker = null;

    // Web Worker をインラインで生成（バックグラウンド対応）
    const workerCode = `
      let timer = null;
      self.onmessage = function(e) {
        if (e.data.type === 'start') {
          clearInterval(timer);
          let remaining = e.data.remaining;
          timer = setInterval(() => {
            remaining--;
            self.postMessage({ remaining });
            if (remaining <= 0) clearInterval(timer);
          }, 1000);
        }
        if (e.data.type === 'stop') clearInterval(timer);
      };
    `;
    const blob = new Blob([workerCode], { type: 'application/javascript' });
    worker = new Worker(URL.createObjectURL(blob));
    worker.onmessage = function(e) {
      remaining = e.data.remaining;
      clock.textContent = fmt(remaining);
      updateRing();
      if (remaining <= 10 && remaining > 0) {
        status.textContent = remaining + ' sec remaining';
        ring.style.stroke = '#ff5c5c';
        clock.className = 'clock finished';
      }
      if (remaining <= 0) {
        status.textContent = 'Complete! Good work.';
        ring.style.strokeDashoffset = 0;
        secBtns.forEach(b => b.classList.remove('active'));
      }
    };
    const clock = document.getElementById('clock');
    const sub = document.getElementById('clock-sub');
    const ring = document.getElementById('ring');
    const status = document.getElementById('status');
    const secBtns = document.querySelectorAll('.sec-btn');

    function fmt(s) {
      return String(Math.floor(s/60)).padStart(2,'0') + ':' + String(s%60).padStart(2,'0');
    }
    function updateRing() {
      ring.style.strokeDashoffset = CIRC * remaining / total;
    }
    function startTimer(sec) {
      worker.postMessage({ type: 'stop' });
      total = sec; remaining = sec;
      clock.className = 'clock running';
      ring.style.stroke = '#4da6ff';
      clock.textContent = fmt(remaining);
      sub.textContent = sec + ' sec';
      updateRing();
      status.textContent = '';
      secBtns.forEach(b => b.classList.remove('active'));
      secBtns[[90,120,150,180].indexOf(sec)].classList.add('active');
      worker.postMessage({ type: 'start', remaining });
    }
    function stopTimer() {
      worker.postMessage({ type: 'stop' });
      status.textContent = '';
    }
    function resetTimer() {
      worker.postMessage({ type: 'stop' });
      total = 0; remaining = 0;
      clock.className = 'clock';
      clock.textContent = '00:00';
      sub.textContent = '— sec';
      ring.style.stroke = '#4da6ff';
      ring.style.strokeDashoffset = CIRC;
      status.textContent = '';
      secBtns.forEach(b => b.classList.remove('active'));
    }
    ring.style.strokeDashoffset = CIRC;
  </script>
</body>
</html>
